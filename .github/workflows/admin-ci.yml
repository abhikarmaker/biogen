name: Admin CI

on:
  push:
    branches: [main]
    paths: ['admin/**']
  pull_request:
    paths: ['admin/**']

defaults:
  run:
    working-directory: admin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
